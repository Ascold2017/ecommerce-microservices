version: '3.8'

networks:
  ecom-network:
    driver: bridge

volumes:
  postgres_data:

services:
  # ---------- Postgres: хранилище для auth и order сервисов ----------
  postgres:
    image: postgres:16
    container_name: ecom-postgres
    environment:
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom_pass
      POSTGRES_DB: postgres     # база по умолчанию; наши создаст init-скрипт
    networks:
      - ecom-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ecom -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data          # данные переживут перезапуск
      - ./init-db:/docker-entrypoint-initdb.d           # SQL-скрипты, выполняются при первом старте

  # ---------- Kafka (KRaft-режим, без Zookeeper) ----------
  kafka:
    image: apache/kafka:3.9.1
    container_name: ecom-kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - ecom-network
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9092" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  centrifugo:
    image: centrifugo/centrifugo:v6.7.0
    container_name: ecom-centrifugo
    command: centrifugo -c /centrifugo/config.json
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo:/centrifugo
    ulimits:
      nofile: { soft: 65536, hard: 65536 }
    networks:
      - ecom-network
    # ---------- Java / Spring Микросервисы ----------

  api-gateway:
    build:
      context: ../api-gateway # Путь к папке, где лежит Dockerfile для гейтвея
    container_name: ecom-api-gateway
    ports:
      - "8080:8080" # Открываем порт наружу, чтобы тестировать запросы с хоста
    environment:
      # Переопределяем урлы внутренних сервисов.
      # Пока они не в докере, можно временно оставить localhost, но так как гейтвей в контейнере,
      # для него localhost — это он сам. Поэтому сразу пишем будущие имена контейнеров:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - ORDER_SERVICE_URL=http://order-service:8082
      - NOTIFICATIONS_SERVICE_URL=http://notifications-service:8083
      - STOCK_SERVICE_URL=http://stock-service:8084
      - PAYMENT_SERVICE_URL=http://payment-service:8086
      - FRONTEND_SERVICE_URL=http://frontend-service:8085
    networks:
      - ecom-network

  auth-service:
    build:
      context: ../auth-service # Путь к папке модуля auth-service
    container_name: ecom-auth-service
    # Порты наружу НЕ выводим. api-gateway достучится до него внутри сети Docker.
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/auth_db # 'postgres' вместо 'localhost'
      - SPRING_DATASOURCE_USERNAME=ecom
      - SPRING_DATASOURCE_PASSWORD=ecom_pass
      - JWT_SECRET=c2VjcmV0LWtleS1mb3ItZWNvbW1lcmNlLWF1dGgtc2VydmljZS1kZXY=
    networks:
      - ecom-network
    depends_on:
      postgres:
        condition: service_healthy # Ждем, пока Postgres отработает init-скрипты и поднимется

  frontend-service:
    build:
      context: ../frontend # Путь к папке java-фронтенда
    container_name: ecom-frontend-service
    networks:
      - ecom-network

  notifications-service:
    build:
      context: ../notification-service # Путь к папке модуля
    container_name: ecom-notification-service
    environment:
      # Внутри Docker-сети подключаемся к кафке по имени контейнера и порту 9092
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CENTRIFUGO_API_URL=http://centrifugo:8000
    networks:
      - ecom-network
    depends_on:
      kafka:
        condition: service_healthy # Ждем полной готовности Кафки принимать топики
  # ---------- Сервис Заказов ----------
  order-service:
    build:
      context: ../order-service # Путь к папке модуля order-service
    container_name: ecom-order-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/orders_db # 'postgres' вместо 'localhost'
      - SPRING_DATASOURCE_USERNAME=ecom
      - SPRING_DATASOURCE_PASSWORD=ecom_pass
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092                       # Внутренний порт Кафки в сети Docker
    networks:
      - ecom-network
    depends_on:
      postgres:
        condition: service_healthy # Ждем инициализации СУБД
      kafka:
        condition: service_healthy # Ждем полной готовности брокера

  # ---------- Сервис Оплаты ----------
  payment-service:
    build:
      context: ../payment-service # Путь к папке модуля payment-service
    container_name: ecom-payment-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payments_db # Имя контейнера бд
      - SPRING_DATASOURCE_USERNAME=ecom
      - SPRING_DATASOURCE_PASSWORD=ecom_pass
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092                       # Порт внутри сети Docker
    networks:
      - ecom-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  stock-service:
    build:
      context: ../stock-service
    container_name: ecom-stock-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/stock_db
      - SPRING_DATASOURCE_USERNAME=ecom
      - SPRING_DATASOURCE_PASSWORD=ecom_pass
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - ecom-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy