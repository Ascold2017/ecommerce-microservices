server:
  port: 8081 # auth будет жить на 8081 (8082 — order, 8083 — notification)

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: ecom
    password: ecom_pass
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.format_sql: true
jwt:
  secret: ${JWT_SECRET:c2VjcmV0LWtleS1mb3ItZWNvbW1lcmNlLWF1dGgtc2VydmljZS1kZXY=}
  expiration-ms: 3600000   # 1 час