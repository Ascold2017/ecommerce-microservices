<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <title>E-commerce</title>
    </head>
    <body>
        <h2>Вход</h2>
        <input id="email" placeholder="email">
        <input id="password" type="password" placeholder="пароль">
        <button onclick="login()">Войти</button>

        <h2>Каталог</h2>
        <ul id="products"></ul>

        <h2>Уведомления</h2>
        <ul id="messages"></ul>

        <script src="https://unpkg.com/centrifuge@5/dist/centrifuge.js"></script>
        <script>
            let centrifuge = null;
            let appJwt = localStorage.getItem('token');
            if (appJwt) connectWs();

            getProducts();

            async function getProducts() {
                const res = await fetch('http://localhost:8080/api/stock/products', {
                    headers: {
                        'Authorization': `Bearer ${appJwt}`
                    }
                });

                const products = await res.json();
                const productsList = document.getElementById('products');
                productsList.innerHTML = '';
                products.forEach(product => renderProduct(product));
            }

            async function login() {
                const res = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                appJwt = (await res.json()).token;
                localStorage.setItem('token', appJwt);
                connectWs();
            }

            async function orderProduct(productId, quantity) {
                await fetch('http://localhost:8080/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + appJwt
                    },
                    body: JSON.stringify({
                        productId: productId,
                        quantity: +quantity
                    })
                });
            }



            async function connectWs() {
                if (centrifuge) return;          // уже подключены — выходим
                // 1) берём connection-токен у бэкенда (через gateway, с нашим app-JWT)
                const resp = await fetch('/api/notifications/token', {
                    headers: { 'Authorization': 'Bearer ' + appJwt }
                });
                const { token, channel } = await resp.json();

                // 2) коннектимся к Centrifugo НАПРЯМУЮ (не через gateway)
                centrifuge = new Centrifuge('ws://localhost:8000/connection/websocket', { token });

                // 3) подписываемся на свой персональный канал
                const sub = centrifuge.newSubscription(channel);
                sub.on('publication', (ctx) => {
                    console.log('уведомление:', ctx.data.message);   // показать в UI

                    document.getElementById('messages').innerHTML += ctx.data.message + '<br>';

                    getProducts();
                });
                sub.subscribe();

                centrifuge.connect();
            }

            function renderProduct(item) {
                const li = document.createElement('li');
                li.textContent = `${item.name} - (осталось ${item.availableQuantity}) $${item.price} `

                const quantityInput = document.createElement('input');
                quantityInput.type = 'number';
                quantityInput.min = 1;
                quantityInput.value = 1;
                quantityInput.placeholder = 'Количество';

                li.appendChild(quantityInput);

                const orderButton = document.createElement('button');
                orderButton.textContent = 'Заказать';
                orderButton.addEventListener('click', () => {
                    const quantity = parseInt(quantityInput.value);
                    orderProduct(item.id, quantity);
                });

                li.appendChild(orderButton);

                products.appendChild(li);
            }
        </script>
    </body>
</html>
