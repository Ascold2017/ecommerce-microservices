server:
  port: 8086

spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payments_db}
    username: ${SPRING_DATASOURCE_USERNAME:ecom}
    password: ${SPRING_DATASOURCE_PASSWORD:ecom_pass}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.format_sql: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.type.mapping: paymentCompleted:com.ecommerce.core.event.PaymentCompleted,paymentFailed:com.ecommerce.core.event.PaymentFailed
        spring.json.trusted.packages: com.ecommerce.core.event
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.type.mapping: stockReserved:com.ecommerce.core.event.StockReserved
        spring.json.trusted.packages: com.ecommerce.core.event
payment.decline-threshold: 1000