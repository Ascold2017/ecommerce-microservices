server:
  port: 8083

spring:
  application:
    name: notification-service
  kafka:
    # Используем переменную со значением по умолчанию для локального запуска
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.type.mapping: >-
          orderCreated:com.ecommerce.notificationservice.event.OrderCreatedEvent,
          stockReserved:com.ecommerce.notificationservice.event.StockReserved,
          paymentCompleted:com.ecommerce.notificationservice.event.PaymentCompleted,
          stockReservationFailed:com.ecommerce.notificationservice.event.StockReservationFailedEvent,
          paymentFailed:com.ecommerce.notificationservice.event.PaymentFailed
        spring.json.trusted.packages: "*"

