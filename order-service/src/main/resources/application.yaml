server:
  port: 8082  # order-service на 8082

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/orders_db
    username: ecom
    password: ecom_pass
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.format_sql: true
  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.type.mapping: orderCreated:com.ecommerce.orderservice.event.OrderCreatedEvent
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.type.mapping: paymentCompleted:com.ecommerce.orderservice.event.PaymentCompleted,stockReservationFailed:com.ecommerce.orderservice.event.StockReservationFailedEvent,paymentFailed:com.ecommerce.orderservice.event.PaymentFailedEvent
        spring.json.trusted.packages: com.ecommerce.orderservice.event